name: tender

services:
  postgres:
    image: postgres:16-alpine
    container_name: tender-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tender}
      POSTGRES_USER: ${POSTGRES_USER:-tender}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tender} -d ${POSTGRES_DB:-tender}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: tender-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-02-18T16-25-55Z
    container_name: tender-minio
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change-me}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

  minio-init:
    image: minio/mc:RELEASE.2025-02-21T16-00-46Z
    container_name: tender-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set tender http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-change-me}; do sleep 2; done &&
      mc mb --ignore-existing tender/${MINIO_BUCKET_RAW:-tender-raw} &&
      mc mb --ignore-existing tender/${MINIO_BUCKET_EXPORT:-tender-export} &&
      mc anonymous set private tender/${MINIO_BUCKET_RAW:-tender-raw} &&
      mc anonymous set private tender/${MINIO_BUCKET_EXPORT:-tender-export}
      "
    restart: "no"

  opensearch:
    image: opensearchproject/opensearch:${OPENSEARCH_VERSION:-3.3.1}
    container_name: tender-opensearch
    environment:
      OPENSEARCH_JAVA_OPTS: ${OPENSEARCH_JAVA_OPTS:--Xms512m -Xmx512m}
      discovery.type: single-node
      bootstrap.memory_lock: "true"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "${OPENSEARCH_HTTP_PORT:-9200}:9200"
      - "${OPENSEARCH_TRANSPORT_PORT:-9600}:9600"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
      - ./opensearch/opensearch.yml:/usr/share/opensearch/config/opensearch.yml:ro
      - ./opensearch/synonyms.txt:/usr/share/opensearch/config/synonyms.txt:ro
    restart: unless-stopped

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:${OPENSEARCH_VERSION:-3.3.1}
    container_name: tender-opensearch-dashboards
    profiles: ["dashboards"]
    depends_on:
      - opensearch
    environment:
      OPENSEARCH_HOSTS: '["http://opensearch:9200"]'
    ports:
      - "5601:5601"
    restart: unless-stopped

  backend:
    image: python:3.12-slim
    container_name: tender-backend
    profiles: ["app"]
    working_dir: /workspace/backend
    command:
      [
        "sh",
        "-c",
        "pip install -e '.[dev]' && uvicorn tender_backend.main:app --host 0.0.0.0 --port 8000 --reload",
      ]
    environment:
      APP_ENV: local
      DATABASE_URL: postgresql://${POSTGRES_USER:-tender}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-tender}
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: http://minio:9000
      OPENSEARCH_URL: https://opensearch:9200
      AI_GATEWAY_URL: http://ai-gateway:8100
    volumes:
      - ../backend:/workspace/backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
      opensearch:
        condition: service_started
    ports:
      - "${BACKEND_PORT:-8000}:8000"

  ai-gateway:
    image: python:3.12-slim
    container_name: tender-ai-gateway
    profiles: ["app"]
    working_dir: /workspace/ai_gateway
    command:
      [
        "sh",
        "-c",
        "pip install -e '.[dev]' && uvicorn tender_ai_gateway.main:app --host 0.0.0.0 --port 8100 --reload",
      ]
    environment:
      APP_ENV: local
    volumes:
      - ../ai_gateway:/workspace/ai_gateway
    ports:
      - "${AI_GATEWAY_PORT:-8100}:8100"

  frontend:
    image: node:20-alpine
    container_name: tender-frontend
    profiles: ["app"]
    working_dir: /workspace/frontend
    command:
      [
        "sh",
        "-c",
        "npm install && npm run dev -- --host 0.0.0.0 --port 3000",
      ]
    environment:
      VITE_API_BASE_URL: http://localhost:${BACKEND_PORT:-8000}
    volumes:
      - ../frontend:/workspace/frontend
      - frontend_node_modules:/workspace/frontend/node_modules
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"

volumes:
  frontend_node_modules:
  postgres_data:
  redis_data:
  minio_data:
  opensearch_data:
